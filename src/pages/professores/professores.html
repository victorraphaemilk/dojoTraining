<section>
    <div class="professores">
        @for (professor of professores(); track professor.id){
            @if(!(professor.image === "")) {
                <div class="card">
                    <img [src]="professor.image" [alt]="professor.name">
                    <h2>{{professor.name}}</h2>
                    <p>{{professor.house}}</p>
                    <p>{{professor.patronus}}</p>
                </div>
            }
        }

    </div>
    
</section>
